<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Location | Luxury Spa Riyadh</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-bright: #d4af37;
            --gold-dark: #aa7c11;
            --dark-bg: rgba(15, 15, 15, 0.85);
            --glass-glow: rgba(212, 175, 55, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BACKGROUND SLIDESHOW --- */
        .slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: slideAnimation 24s infinite linear;
        }

        /* Gumamit ako ng mga premium royalty-free massage/spa images galing Unsplash */
        .slide:nth-child(1) {
            background-image: url('https://images.unsplash.com/photo-1540555700478-4be289fbecef?q=80&w=1920');
            animation-delay: 0s;
        }
        .slide:nth-child(2) {
            background-image: url('https://images.unsplash.com/photo-1600334089648-b0d9d3028eb2?q=80&w=1920');
            animation-delay: 6s;
        }
        .slide:nth-child(3) {
            background-image: url('https://images.unsplash.com/photo-1519699047748-de8e457a634e?q=80&w=1920');
            animation-delay: 12s;
        }
        .slide:nth-child(4) {
            background-image: url('https://images.unsplash.com/photo-1596178065887-1198b6148b2b?q=80&w=1920');
            animation-delay: 18s;
        }

        @keyframes slideAnimation {
            0% { opacity: 0; transform: scale(1); }
            4% { opacity: 1; }
            25% { opacity: 1; }
            29% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 0; }
        }

        /* Madilim na patong para mabasa ang text */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.6) 100%);
            z-index: -1;
        }

        /* --- MAP SECTION GLASS CARD --- */
        .map-section {
            background: var(--dark-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), 0 0 15px var(--glass-glow);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            margin: 20px auto;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .map-section h2 {
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .map-section p {
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            line-height: 1.5;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* --- HOME/BACK BUTTON --- */
        .btn-container {
            margin-top: 25px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold-bright) 100%);
            color: #000;
            text-decoration: none;
            font-weight: 500;
            border-radius: 50px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            font-size: 14px;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold-dark) 100%);
        }

        /* Responsive para sa Cellphone */
        @media (max-width: 480px) {
            .map-section {
                padding: 20px 15px;
            }
            .map-section h2 {
                font-size: 22px;
            }
            .map-wrapper {
                height: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="slideshow-container">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="overlay"></div>

    <div class="map-section">
        <h2 style="font-family:'Playfair Display'; color:var(--gold-bright); margin-bottom: 5px;">VISIT OUR SPA</h2>
        <p style="color: #ccc; font-size: 14px;">3100 Al Misroh, Ishbiliyah, RFYA6194, 6194, Riyadh 13251</p>
        <div class="map-wrapper">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3621.5701763750893!2d46.7944111!3d24.810123!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3e2eff26a9df54b9%3A0x28ba134c679a9557!2sIshbiliyah%2C%20Riyadh!5e0!3m2!1sen!2ssa!4v1716890000000!5m2!1sen!2ssa" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>           
        </div>
        
        <div class="btn-container">
            <a href="index.html" class="back-btn">BACK TO HOME</a>
        </div>
    </div>

</body>
</html>
